<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsuranceGenAI | Claim Processor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <nav class="bg-white border-b border-slate-200 px-8 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600 tracking-tight">InsuranceGen<span class="text-slate-800">AI</span></h1>
            <span class="text-sm text-slate-500 font-medium">Claims Intelligence Portal</span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto mt-16 px-6">
        <div class="text-center mb-10">
            <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Process New Claim</h2>
            <p class="text-slate-600 text-lg">Upload a claim PDF to initiate AI extraction and policy validation.</p>
        </div>

        <div id="main-content" class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
            <form action="/upload" method="post" enctype="multipart/form-data" onsubmit="return handleUpload(event)">
                <div class="flex items-center justify-center w-full">
                    <label id="dropzone" class="flex flex-col items-center justify-center w-full h-64 border-2 border-blue-300 border-dashed rounded-xl cursor-pointer bg-blue-50 hover:bg-blue-100 transition-all">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                            <div id="upload-icon">
                                <svg class="w-12 h-12 mb-4 text-blue-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                            </div>
                            <p id="file-name" class="mb-2 text-sm text-slate-700 font-semibold">Click to upload or drag and drop</p>
                            <p class="text-xs text-slate-500">PDF Documents Only (Max 10MB)</p>
                        </div>
                        <input type="file" id="claim_pdf" name="claim_pdf" class="hidden" accept=".pdf" required onchange="updateFileName()" />
                    </label>
                </div>
                <button type="submit" class="w-full mt-6 bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-colors shadow-lg">
                    Analyze Claim
                </button>
            </form>
        </div>

        <div id="loading-overlay" class="hidden text-center p-16 bg-white rounded-2xl shadow-xl border border-slate-200">
            <div class="loader w-16 h-16 border-4 border-slate-200 rounded-full mb-6 mx-auto"></div>
            <h3 class="text-2xl font-bold text-slate-800">Processing Claim...</h3>
            <p class="text-slate-500 mt-2">Our AI Adjuster is extracting data and checking policy coverage.</p>
            <div class="mt-8 text-xs text-blue-500 font-mono animate-pulse">CONNECTING TO AMAZON BEDROCK...</div>
        </div>
    </main>

    <script>
        function updateFileName() {
            const input = document.getElementById('claim_pdf');
            const fileNameDisplay = document.getElementById('file-name');
            const iconContainer = document.getElementById('upload-icon');
            
            if (input.files && input.files[0]) {
                fileNameDisplay.innerHTML = "Selected: <span class='text-blue-600'>" + input.files[0].name + "</span>";
                iconContainer.innerHTML = '<svg class="w-12 h-12 mb-4 text-green-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                document.getElementById('dropzone').classList.add('border-green-400', 'bg-green-50');
            }
        }

        function handleUpload(event) {
          
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('loading-overlay').classList.remove('hidden');
            return true; 
        }
    </script>
</body>
</html>
